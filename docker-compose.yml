version: "3.9"

services:

  backend:
    build: ./backend
    container_name: ai-backend
    networks:
      - ai_network
    ports:
      - "3001:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://ai-mongo:27017/chatdb
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=AIzaSyDC9ZE3afsvMSSY6MuC_BplQB1OEySoWKQ
    depends_on:
      - redis
      - mongo
      - qdrant
    # command: ["sh", "-c", "wait-for-it redis:6379 -- npm run start"]
  # frontend:
  #   build: ./ai-chat-frontend
  #   container_name: ai-frontend
  #   ports:
  #     - "5173:80"
  #   depends_on:
  #     - backend

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    networks:
      - ai_network
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    container_name: ai-mongo
    networks:
      - ai_network
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant
    container_name: ai-qdrant
    networks:
      - ai_network
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # frontend:
  #   build: ./frontend  # Path to your frontend Dockerfile
  #   container_name: ai-frontend
  #   networks:
  #     - ai_network
  #   ports:
  #     - "3000:3000"  # Expose frontend app on port 3000
  #   depends_on:
  #     - backend

volumes:
  mongo_data:
  qdrant_data:

networks:
  ai_network:
    driver: bridge